[PHP]
; IWF Custom Overrides
; =====================
; Settings that override PHP defaults for our Docker environment.
; Reference: https://github.com/php/php-src/blob/master/php.ini-production

; This directive determines whether or not PHP will recognize code between
; <? and ?> tags as PHP source.
; IWF: Production Value (was On)
short_open_tag = Off

; Transparent output compression using the zlib library
; IWF: Production Value (was Off)
zlib.output_compression = Off

; Implicit flush tells PHP to flush automatically after every output block.
; IWF: Off for production performance
implicit_flush = Off

; The unserialize callback function will be called if the unserializer finds an undefined class.
; IWF: Empty (no callback defined)
unserialize_callback_func =

; This directive allows you to disable certain functions for security reasons.
; IWF: Disable pcntl_* functions for security (dangerous in web context)
disable_functions = pcntl_alarm,pcntl_fork,pcntl_waitpid,pcntl_wait,pcntl_wifexited,pcntl_wifstopped,pcntl_wifsignaled,pcntl_wexitstatus,pcntl_wtermsig,pcntl_wstopsig,pcntl_signal,pcntl_signal_dispatch,pcntl_get_last_error,pcntl_strerror,pcntl_sigprocmask,pcntl_sigwaitinfo,pcntl_sigtimedwait,pcntl_exec,pcntl_getpriority,pcntl_setpriority

; Determines the size of the realpath cache to be used by PHP.
realpath_cache_size = 4096K

; Duration of time, in seconds for which to cache realpath information.
; IWF: 600s for better performance on systems with rarely changing files (was 120)
realpath_cache_ttl = 600

; Decides whether PHP may expose the fact that it is installed on the server.
; IWF: Off for security - don't expose PHP version (was On)
expose_php = Off

; Maximum execution time of each script, in seconds.
; IWF: 300s for long-running scripts (was 30)
max_execution_time = 300

; Defines the default timezone used by the date functions.
; IWF: Europe/Zurich (was UTC)
date.timezone = 'Europe/Zurich'

; Maximum amount of time each script may spend parsing request data.
max_input_time = 60

; How many GET/POST/COOKIE input variables may be accepted.
; IWF: 1500 for complex forms (was 1000)
max_input_vars = 1500

; Maximum amount of memory a script may consume.
; IWF: -1 (unlimited) because we manage memory limits via Docker (was 128M)
memory_limit = -1

; Error reporting level.
; IWF: Production Value - report all errors except deprecated and strict
error_reporting = E_ALL & ~E_DEPRECATED

; This directive controls whether or not and where PHP will output errors.
; IWF: Production Value - don't display errors to users (was On)
display_errors = Off

; The display of errors which occur during PHP's startup sequence.
; IWF: Production Value - don't display startup errors (was On)
display_startup_errors = Off

; Log errors to locations such as a server-specific log or STDERR.
; IWF: Production Value - log errors instead of displaying (was Off)
log_errors = On

; Set maximum length of log_errors.
log_errors_max_len = 1024

; Do not log repeated messages.
ignore_repeated_errors = Off
ignore_repeated_source = Off

; Report memory leaks.
report_memleaks = On

; When PHP displays or logs an error, format as HTML.
; IWF: On for formatted error output
html_errors = On

; This directive determines which super global arrays are registered.
; IWF: Production Value - exclude ENV for performance (was EGPCS)
variables_order = "GPCS"

; This directive determines which super global data should be registered into REQUEST.
; IWF: Production Value (was none)
request_order = "GP"

; This directive determines whether PHP registers $argv & $argc.
; IWF: Production Value - disable for performance (was On)
register_argc_argv = Off

; When enabled, ENV, REQUEST and SERVER variables are created Just In Time.
auto_globals_jit = On

; Maximum size of POST data that PHP will accept.
; IWF: 500M for large file uploads (was 8M)
post_max_size = 500M

; Automatically add files before PHP document.
; IWF: Empty (no auto-prepend)
auto_prepend_file =

; Automatically add files after PHP document.
; IWF: Empty (no auto-append)
auto_append_file =

; PHP's default character set.
default_charset = "UTF-8"

; The directory under which PHP opens the script using /~username.
; IWF: Empty (no user directory)
user_dir =

; Whether or not to enable the dl() function.
; IWF: Off for security (was On)
enable_dl = Off

; Whether to allow HTTP file uploads.
file_uploads = On

; Maximum allowed size for uploaded files.
; IWF: 500M for large file uploads (was 2M)
upload_max_filesize = 500M

; Maximum number of files that can be uploaded via a single request.
max_file_uploads = 20

; Whether to allow the treatment of URLs as files.
allow_url_fopen = On

; Whether to allow include/require to open URLs as files.
; IWF: Off for security - never allow remote includes
allow_url_include = Off

; Default timeout for socket based streams.
default_socket_timeout = 60

[mail function]
; For Unix only.
sendmail_path = /usr/sbin/sendmail -t -i

; Add X-PHP-Originating-Script header.
; IWF: On for mail debugging/tracking (was Off)
mail.add_x_header = On

[Session]
; Handler used to store/retrieve data.
session.save_handler = files

; Whether to use cookies.
session.use_cookies = 1

; This option forces PHP to fetch and use a cookie for storing the session id.
session.use_only_cookies = 1

; Name of the session (used as cookie name).
session.name = PHPSESSID

; Initialize session on request startup.
session.auto_start = 0

; Lifetime in seconds of cookie or, if 0, until browser is restarted.
session.cookie_lifetime = 0

; The path for which the cookie is valid.
session.cookie_path = /

; The domain for which the cookie is valid.
session.cookie_domain =

; Handler used to serialize data.
session.serialize_handler = php

; Defines the probability that the 'garbage collection' process is started.
; IWF: 0 to disable automatic GC - handled externally (was 1)
session.gc_probability = 0

; Defines the probability divisor for garbage collection.
; IWF: Production Value (was 100)
session.gc_divisor = 1000

; After this number of seconds, stored data will be seen as 'garbage'.
session.gc_maxlifetime = 1440

; Set to determine HTTP caching aspects.
session.cache_limiter = nocache

; Document expires after n minutes.
session.cache_expire = 180

; trans sid support is disabled by default.
session.use_trans_sid = 0

; The URL rewriter will look for URLs in a defined set of HTML tags.
; IWF: Production Value (was "form=")
url_rewriter.tags = "a=href,area=href,frame=src,input=src,form=fakeentry"

[mysqlnd]
; Enable / Disable collection of general statistics by mysqlnd.
mysqlnd.collect_statistics = On

; Enable / Disable collection of memory usage statistics by mysqlnd.
; IWF: Off for production performance
mysqlnd.collect_memory_statistics = Off

[opcache]
; Determines if Zend OPCache is enabled.
; IWF: On for production performance
opcache.enable = 1

; Determines if Zend OPCache is enabled for the CLI version of PHP.
; IWF: On for CLI performance (was Off)
opcache.enable_cli = 1

; The maximum number of keys (scripts) in the OPcache hash table.
; IWF: ~20000 (next prime 32531) for larger codebases (was 10000)
opcache.max_accelerated_files = 20000
